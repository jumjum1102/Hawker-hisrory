    const GOLD = "#D4A843";
    const BG = "#0D0D0D";
    const BG2 = "#0A0A0A";
    const LINE = "#1E1E1E";
    const MUTED = "#888";
    const TEXT = "#C8C4BE";
    const WHITE = "#F0EDE8";

    function useIsMobile() {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 800);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      return w < 640;
    }

    function SectionHeader({ num, ja, en, sp }) {
      return (
        <div style={{ marginBottom: sp ? 32 : 56 }}>
          <div style={{ marginBottom: sp ? 20 : 40 }}>
            <div style={{ fontFamily: "sans-serif", fontSize: 9, letterSpacing: 3, color: GOLD, textTransform: "uppercase", marginBottom: 8 }}>{num}</div>
            <div style={{ fontSize: sp ? 20 : "clamp(22px,4vw,40px)", fontWeight: 700, lineHeight: 1.35, whiteSpace: "pre-wrap" }}>{ja}</div>
            <div style={{ fontFamily: "'Georgia',serif", fontStyle: "italic", fontSize: 13, color: "#555", marginTop: 4 }}>{en}</div>
          </div>
          <div style={{ width: "100%", height: 1, background: LINE }} />
        </div>
      );
    }

    function TLItem({ year, title, text, sp }) {
      return (
        <div style={{ display: "flex", gap: sp ? 12 : 24, paddingBottom: 28 }}>
          <div style={{ fontFamily: "sans-serif", fontSize: sp ? 14 : 20, color: GOLD, flexShrink: 0, width: sp ? 54 : 80, paddingTop: 2, fontWeight: 700, lineHeight: 1.2 }}>{year}</div>
          <div style={{ flex: 1, paddingBottom: 20, borderBottom: `1px solid ${LINE}` }}>
            <div style={{ fontSize: sp ? 13 : 15, fontWeight: 700, marginBottom: 5 }}>{title}</div>
            <div style={{ fontSize: sp ? 12 : 13, lineHeight: 1.9, color: MUTED }}>{text}</div>
          </div>
        </div>
      );
    }

    function App() {
      const sp = useIsMobile();
      const [active, setActive] = useState("hero");
      const [openCard, setOpenCard] = useState(null);

      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => entries.forEach(e => {
            if (e.isIntersecting) setActive(e.target.id);
          }),
          { threshold: 0.25 }
        );
        NAV_ITEMS.forEach(({ id }) => {
          const el = document.getElementById(id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const go = (id) => {
        document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
        setActive(id);
      };

      const PX = sp ? 16 : 48;
      const PY = sp ? 52 : 96;
      const sec = { padding: `${PY}px ${PX}px`, borderBottom: `1px solid #1A1A1A` };
      const secAlt = { ...sec, background: BG2 };
      const body = { fontSize: sp ? 14 : 15, lineHeight: 2, color: TEXT };
      const small = { fontSize: sp ? 11 : 12, lineHeight: 1.9, color: MUTED };
      const infoBox = { border: `1px solid #222`, padding: sp ? "16px 14px" : "22px 20px", marginBottom: 20 };
      const infoBoxTitle = { fontFamily: "sans-serif", fontSize: 9, letterSpacing: 3, color: GOLD, marginBottom: 12, textTransform: "uppercase" };

      return (
        <div style={{ fontFamily: "'Noto Serif JP','Hiragino Mincho ProN',serif", background: BG, color: WHITE, minHeight: "100vh", overflowX: "hidden" }}>

                <div key={id} onClick={() => go(id)} style={{ textAlign: "center", marginBottom: 2, cursor: "pointer" }}>
                  <div style={{ width: 4, height: 4, borderRadius: "50%", background: active === id ? GOLD : "#333", margin: "3px auto", transition: "background .3s" }} />
                  <div style={{ writingMode: "vertical-rl", fontSize: 8, letterSpacing: 2, color: active === id ? GOLD : "#444", padding: "8px 3px", textTransform: "uppercase", fontFamily: "sans-serif", transition: "color .3s" }}>{en}</div>
                </div>
              ))}

          )}

            </nav>

              <img src={HERO_IMG} alt="hawker" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", filter: "brightness(0.3)" }} />
              <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(13,13,13,0.97) 0%, rgba(13,13,13,0.1) 55%)" }} />

                  シンガポール<br />ホーカーセンター<br />完全ガイド

                        <div style={{ fontSize: 20, flexShrink: 0 }}>{h.icon}</div>
                      </div>
                      <div style={{ border: `1px solid ${GOLD}`, color: GOLD, fontSize: 9, padding: "2px 8px", letterSpacing: 1, fontFamily: "sans-serif", display: "inline-block", marginTop: 10, lineHeight: 1.6 }}>{h.tag}</div>
                      {openCard === i && (
                        <div style={{ borderTop: `1px solid #2A2000`, paddingTop: 12, marginTop: 10 }}>
                          <div style={{ fontSize: sp ? 12 : 13, lineHeight: 1.9, color: MUTED }}>{h.note}</div>
                        </div>
                      )}
                      <div style={{ fontFamily: "sans-serif", fontSize: 9, color: "#444", marginTop: 8, letterSpacing: 1 }}>
                        {openCard === i ? "▲ 閉じる" : "▼ 詳細を見る"}
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ border: `1px solid #1A1A1A`, padding: sp ? "16px 14px" : "20px 22px", marginTop: 24 }}>
                <div style={infoBoxTitle}>旅行者のための訪問戦略</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {[
                    ["🌅 朝食・ランチ向き", "Maxwell Food Centre、Tiong Bahru Market。早い時間に並ぶ名店が多く、午後2時頃には閉まるストールも。開店30分前に到着がベスト。"],
                    ["🌙 ディナー・夜向き", "Lau Pa Sat（24時間・夜のサテー通り）、Newton Food Centre（夜に活気増）、Chomp Chomp（夜の炭火BBQが絶品）。"],
                    ["🌊 特別体験向き", "East Coast Lagoon（海辺の食事）、Lau Pa Sat（ビクトリア建築）、Tekka Centre（リトルインディア体験）。"],
                  ].map(([t, b]) => (
                    <div key={t}>
                      <div style={{ fontSize: sp ? 12 : 13, fontWeight: 700, marginBottom: 4 }}>{t}</div>
                      <div style={small}>{b}</div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section id="tips" style={secAlt}>
              <SectionHeader num="07 — TRAVELLER'S TIPS" ja={"旅行者のための\nホーカー完全活用ガイド"} en="Essential Tips for First-Time Hawker Centre Visitors" sp={sp} />
              <img src={FOOD_IMG} alt="tips" style={{ width: "100%", height: sp ? 170 : 250, objectFit: "cover", filter: "brightness(0.75)", marginBottom: 28 }} />

              <div style={{ ...infoBox }}>
                <div style={infoBoxTitle}>ホーカーセンターの基本マナー</div>
                {[
                  ["食べ終えたトレイは返却", "2021年から義務化。返却台に返すこと。違反は罰金対象。"],
                  ["チョーピング（Choping）", "ティッシュや傘を置いて席を確保するローカル習慣。"],
                  ["列に並ぶのが礼儀", "人気ストールは長蛇の列。割り込みはNG。行列がおいしさの目安。"],
                  ["喫煙は指定エリアのみ", "飲食エリアでの喫煙は禁止。指定喫煙所を利用。"],
                ].map(([t, b]) => (
                  <div key={t} style={{ borderBottom: `1px solid ${LINE}`, padding: "10px 0" }}>
                    <div style={{ fontSize: sp ? 12 : 13, fontWeight: 700, marginBottom: 3 }}>✓ {t}</div>
                    <div style={{ ...small, fontSize: sp ? 11 : 12 }}>{b}</div>
                  </div>
                ))}
              </div>

              {[
                { icon: "🕐", t: "ベストな訪問タイミング", b: "混雑ピークはランチ12〜13時とディナー18〜20時。オフピーク（開店直後、14〜17時、20時以降）が狙い目。名物ストールは開店前から並ぶことも。" },
                { icon: "💰", t: "予算の目安", b: "1食S$4〜7が標準。飲み物（コピ/テー）はS$1〜2。デザートを加えても1人S$10以内でフルミールが楽しめる。チリクラブ等はS$40〜80（時価）。" },
                { icon: "🗺️", t: "MRTでのアクセス", b: "Maxwell（馬士威MRT）、Lau Pa Sat（Raffles Place）、Newton（Newton）、Tiong Bahru（Tiong Bahru）等、主要ホーカーはMRT徒歩圏内。Grabも便利。" },
                { icon: "🌡️", t: "暑さ・雨への備え", b: "シンガポールは常夏。開放型のホーカーは日差し・雨の影響あり。帽子・日焼け止め推奨。スコールは短時間で止むことが多い。" },
                { icon: "📸", t: "撮影マナー", b: "料理の写真は自由に。ただしストール主人を撮影する場合は一声かけること。混雑時に通路を塞がないよう配慮を。" },
                { icon: "🥜", t: "アレルギー・食事制限", b: "ナッツ、シーフード、グルテンのアレルギーがある場合は必ず確認を。ハラール認証マークのあるストールはイスラム法に則った食材使用。" },
                { icon: "🗣️", t: "Singlishと注文のコツ", b: "「One [dish name], please」で通じる。コーヒーは「Kopi」、紅茶は「Teh」。指差し注文もOK。" },
                { icon: "🏅", t: "ミシュランとBib Gourmand", b: "シンガポールのミシュランガイドには多数のホーカーストールが掲載。Bib Gourmandは「高品質でお値打ち」の証。Tian Tian Chicken Rice（Maxwell）等が著名。" },
              ].map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 14, padding: "14px 0", borderBottom: `1px solid ${LINE}` }}>
                  <div style={{ fontSize: 20, flexShrink: 0, width: 28 }}>{t.icon}</div>
                  <div>
                    <div style={{ fontSize: sp ? 13 : 14, fontWeight: 700, marginBottom: 4 }}>{t.t}</div>
                    <div style={small}>{t.b}</div>
                  </div>
                </div>
              ))}
            </section>

            <footer style={{ padding: sp ? "36px 16px 20px" : "44px 48px 28px", borderTop: `1px solid #1A1A1A` }}>
              <div style={{ fontFamily: "'Georgia',serif", fontStyle: "italic", fontSize: sp ? 18 : 22, color: GOLD, marginBottom: 6 }}>Hawker Culture Singapore</div>
              <div style={{ fontFamily: "sans-serif", fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 16 }}>UNESCO Intangible Cultural Heritage of Humanity — 2020</div>
              <div style={{ fontFamily: "sans-serif", fontSize: 10, color: "#333", lineHeight: 1.8 }}>
                本ページの情報は調査・取材に基づきますが、ホーカーセンターの営業時間・ストール詳細は変更される場合があります。最新情報はNEA公式サイトまたは現地にてご確認ください。<br />
                Images: Unsplash (CC0 License)
              </div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
